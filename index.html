<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>🩸Vaelarian - Codificar ou Decodificar</title>
<link rel="icon" type="image/png" href="decoder.encoder.png">

<style>
@font-face {
  font-family: 'DoctorGlitch';
  src: url('DoctorGlitch.otf') format('opentype');
}

/* === Fundo desfocado === */
body {
  margin: 0;
  padding: 0;
  font-family: 'DoctorGlitch', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: url('kangback.jpg') no-repeat center center/cover;
  overflow: hidden;
}

body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: inherit;
  filter: blur(18px) brightness(0.5);
  transform: scale(1.05);
  z-index: -2;
}

/* === Cartão translúcido central === */
.container {
  background: rgba(60, 0, 0, 0.25);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255, 0, 0, 0.1);
  border-radius: 18px;
  box-shadow: 0 0 35px rgba(255, 0, 0, 0.15);
  padding: 3rem 2.5rem;
  width: 90%;
  max-width: 600px;
  text-align: center;
  animation: fadeIn 1.2s ease;
}

/* === Título === */
h2 {
  color: rgba(255, 80, 80, 0.95);
  font-size: 2.4rem;
  margin-bottom: 2rem;
  text-shadow: 0 0 10px rgba(255, 30, 30, 0.4);
}

/* === Tabs === */
.tabs {
  display: flex;
  justify-content: center;
  gap: 1rem;
  margin-bottom: 1.8rem;
}
.tab {
  padding: 0.7rem 1.5rem;
  border-radius: 12px;
  background: rgba(255, 0, 0, 0.05);
  color: rgba(255, 80, 80, 0.4);
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 1.1rem;
}
.tab:hover {
  background: rgba(255, 0, 0, 0.15);
  color: rgba(255, 100, 100, 0.7);
}
.tab.active {
  background: rgba(255, 0, 0, 0.25);
  color: rgba(255, 150, 150, 0.95);
  box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
}

/* === Textarea === */
textarea {
  width: 100%;
  height: 6rem;
  border-radius: 12px;
  border: none;
  outline: none;
  padding: 1rem;
  resize: none;
  font-size: 1.1rem;
  background: rgba(255, 255, 255, 0.05);
  color: rgba(255, 150, 150, 0.85);
  backdrop-filter: blur(6px);
  transition: 0.3s;
}
textarea::placeholder {
  color: rgba(255, 100, 100, 0.3);
  font-style: italic;
}
textarea:focus {
  box-shadow: 0 0 12px rgba(255, 0, 0, 0.25);
}

/* === Botão === */
button {
  margin-top: 1.3rem;
  padding: 0.9rem 2.3rem;
  font-size: 1.2rem;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: rgba(255, 0, 0, 0.1);
  color: rgba(255, 150, 150, 0.6);
  transition: all 0.3s;
  font-family: 'DoctorGlitch', sans-serif;
}
button:hover {
  background: rgba(255, 0, 0, 0.25);
  color: rgba(255, 180, 180, 0.9);
  box-shadow: 0 0 12px rgba(255, 0, 0, 0.25);
}

/* === Saída === */
#saida {
  margin-top: 1.5rem;
  padding: 1.3rem;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.05);
  color: rgba(255, 150, 150, 0.85);
  white-space: pre-wrap;
  font-size: 1.1rem;
  backdrop-filter: blur(6px);
  min-height: 3rem;
}

/* === Animação === */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>
  <div class="container">
    <h2>🩸 Vaelarian - Codificar ou Decodificar</h2>

    <div class="tabs">
      <div class="tab active" id="tabEncode">Codificar</div>
      <div class="tab" id="tabDecode">Decodificar</div>
    </div>

    <div id="encodeSection">
      <textarea id="inputEncode" placeholder="Digite o texto que deseja codificar..."></textarea>
      <button onclick="codificar()">Codificar</button>
    </div>

    <div id="decodeSection" style="display:none">
      <textarea id="inputDecode" placeholder="Cole o texto codificado..."></textarea>
      <button onclick="decodificar()">Decodificar</button>
    </div>

    <div id="saida">(a saída aparece aqui)</div>
  </div>

<script>
/* --- Alfabeto --- */
const alfabetos = {
  A:"ಅ",B:"𐌁",C:"চ",D:"Д",E:"え",F:"ᕓ",G:"ಗ",H:"𐌇",I:"ই",J:"Ж",
  K:"き",L:"ᒪ",M:"ಮ",N:"𐌍",O:"ও",P:"П",Q:"ಕ್ವ",R:"ᕒ",S:"ಸ",T:"𐌕",
  U:"উ",V:"В",W:"ゔぃ",X:"ᐊᔅ",Y:"ಯ",Z:"𐌆"
};
const mapaInvertido = {};
for(const l in alfabetos){ mapaInvertido[alfabetos[l]] = l; }

function codificar(){
  const t = document.getElementById("inputEncode").value.toUpperCase();
  let r = "";
  for(const c of t){ r += alfabetos[c] || c; }
  document.getElementById("saida").textContent = r;
}
function decodificar(){
  const t = document.getElementById("inputDecode").value;
  let r = "", i = 0;
  while(i < t.length){
    let e = false;
    for(let l = 3; l > 0; l--){
      const s = t.slice(i,i+l);
      if(mapaInvertido[s]){
        r += mapaInvertido[s];
        i += l;
        e = true;
        break;
      }
    }
    if(!e){ r += t[i]; i++; }
  }
  document.getElementById("saida").textContent = r;
}

/* --- Tabs --- */
const tabE=document.getElementById("tabEncode");
const tabD=document.getElementById("tabDecode");
const secE=document.getElementById("encodeSection");
const secD=document.getElementById("decodeSection");

tabE.onclick=()=>{ 
  tabE.classList.add("active");
  tabD.classList.remove("active");
  secE.style.display="block";
  secD.style.display="none";
  document.getElementById("saida").textContent="(a saída aparece aqui)";
};
tabD.onclick=()=>{ 
  tabD.classList.add("active");
  tabE.classList.remove("active");
  secD.style.display="block";
  secE.style.display="none";
  document.getElementById("saida").textContent="(a saída aparece aqui)";
};
</script>
</body>
</html>
