<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🩸Vaelarian - Encode or Decode</title>
<link rel="icon" type="image/png" href="decoder.encoder.png">
<style>
@font-face {
  font-family: 'DoctorGlitch';
  src: url('DoctorGlitch.otf') format('opentype');
}

/* --- Fundo desfocado --- */
body{
  font-family:'DoctorGlitch', sans-serif;
  margin:0;
  padding:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  background:url('kangback.jpg') no-repeat center center/cover;
  position:relative;
  overflow:hidden;
}

body::before{
  content:'';
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background:inherit;
  filter:blur(12px);
  z-index:-1;
}

/* --- Fade suave --- */
.fade-in{
  opacity:0;
  animation: fadeAppear 1.2s forwards;
}

@keyframes fadeAppear{
  to{ opacity:1; }
}

/* --- Título --- */
h2{
  font-size:2.8rem;
  color: rgba(230,57,70,0.9);
  text-align:center;
  margin-bottom:1.8rem;
  margin-top:-2rem;
  z-index:1;
}

/* --- Abas --- */
.tabs{
  display:flex;
  gap:1rem;
  margin-bottom:1rem;
  z-index:1;
}
.tab{
  padding:.6rem 1.2rem;
  cursor:pointer;
  border-radius:8px;
  background: rgba(230,57,70,0.1);
  color: rgba(230,57,70,0.25); /* mais fantasma */
  font-size:1.35rem;
  transition:0.3s;
}
.tab.active{
  background: rgba(230,57,70,0.25);
  color: rgba(230,57,70,0.6); /* ativo mais visível, ainda sutil */
}

/* --- Textareas --- */
textarea{
  width:90%;
  max-width:700px;
  height:5.5rem;
  font-size:1.35rem;
  padding:1.2rem;
  border:none;
  border-radius:12px;
  background: rgba(230,57,70,0.05);
  color: rgba(230,57,70,0.6); /* texto mais fantasma */
  resize:vertical;
  z-index:1;
}
textarea::placeholder{
  color: rgba(230,57,70,0.25); /* placeholder bem sutil */
  font-style:italic;
}

/* --- Botões --- */
button{
  margin-top:1.2rem;
  padding:.95rem 2.3rem;
  font-size:1.35rem;
  background: rgba(230,57,70,0.1);
  border:none;
  border-radius:10px;
  color: rgba(230,57,70,0.25); /* texto fantasma */
  cursor:pointer;
  transition:0.3s;
  z-index:1;
}
button:hover{
  background: rgba(230,57,70,0.25);
  color: rgba(230,57,70,0.6); /* hover mais visível */
}

/* --- Saída --- */
#saida{
  margin-top:1rem;
  white-space:pre-wrap;
  font-size:1.35rem;
  background: rgba(230,57,70,0.05);
  padding:1.4rem;
  width:90%;
  max-width:700px;
  border-radius:12px;
  color: rgba(230,57,70,0.6);
  font-family:'Arial',sans-serif;
  z-index:1;
}
</style>
</head>
<body>

<h2 class="fade-in">🩸Vaelarian - Encode or Decode</h2>

<div class="tabs fade-in">
  <div class="tab active" id="tabEncode">Encode</div>
  <div class="tab" id="tabDecode">Decode</div>
</div>

<div id="encodeSection" class="fade-in">
  <textarea id="inputEncode" placeholder="Type your text to encode..."></textarea><br/>
  <button onclick="codificar()">Encode</button>
</div>

<div id="decodeSection" class="fade-in" style="display:none">
  <textarea id="inputDecode" placeholder="Paste your encoded text..."></textarea><br/>
  <button onclick="decodificar()">Decode</button>
</div>

<div id="saida" class="fade-in">(output appears here)</div>

<script>
/* --- Alfabeto único --- */
const alfabetos = {
  A: "ಅ", B: "𐌁", C: "চ", D: "Д", E: "え", F: "ᕓ",
  G: "ಗ", H: "𐌇", I: "ই", J: "Ж", K: "き", L: "ᒪ",
  M: "ಮ", N: "𐌍", O: "ও", P: "П", Q: "ಕ್ವ", R: "ᕒ",
  S: "ಸ", T: "𐌕", U: "উ", V: "В", W: "ゔぃ", X: "ᐊᔅ",
  Y: "ಯ", Z: "𐌆"
};

/* --- Mapa invertido para decodificação --- */
const mapaInvertido = {};
for(const letra in alfabetos){
  mapaInvertido[alfabetos[letra]] = letra;
}

/* --- Codificar / Decodificar --- */
function codificar(){
  const texto = document.getElementById("inputEncode").value.toUpperCase();
  let resultado = "";
  for(const ch of texto){
    resultado += alfabetos[ch] || ch;
  }
  document.getElementById("saida").textContent = resultado;
}

function decodificar(){
  const texto = document.getElementById("inputDecode").value;
  let resultado = "", i = 0;
  while(i < texto.length){
    let encontrado = false;
    for(let len = 3; len > 0; len--){
      const trecho = texto.slice(i,i+len);
      if(mapaInvertido[trecho]){
        resultado += mapaInvertido[trecho];
        i += len;
        encontrado = true;
        break;
      }
    }
    if(!encontrado){ resultado += texto[i]; i++; }
  }
  document.getElementById("saida").textContent = resultado;
}

/* --- Tabs --- */
const tabEncode=document.getElementById("tabEncode");
const tabDecode=document.getElementById("tabDecode");
const encodeSec=document.getElementById("encodeSection");
const decodeSec=document.getElementById("decodeSection");

tabEncode.addEventListener("click",()=>{
  tabEncode.classList.add("active");
  tabDecode.classList.remove("active");
  encodeSec.style.display="block";
  decodeSec.style.display="none";
  document.getElementById("saida").textContent="(output appears here)";
});
tabDecode.addEventListener("click",()=>{
  tabDecode.classList.add("active");
  tabEncode.classList.remove("active");
  decodeSec.style.display="block";
  encodeSec.style.display="none";
  document.getElementById("saida").textContent="(output appears here)";
});
</script>
</body>
</html>
